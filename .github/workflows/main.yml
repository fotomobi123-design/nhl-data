name: NHL Trade Scraper

on:
  schedule:
    - cron: '*/30 * * 1,4,5,6,8,9,10,11,12 *'
    - cron: '*/5 * * 2,3,7 *'
  workflow_dispatch:

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    # Pridávame povolenie zápisu priamo do kódu pre istotu
    permissions:
      contents: write
    steps:
      - name: Stiahnutie kodu
        uses: actions/checkout@v3

      - name: Priprava Pythonu
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalacia kniznic
        run: pip install google-generativeai

      - name: Spustenie analyzy
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scraper.py

      - name: Ulozenie vysledku do repozitara
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          git add data.json
          # Commitne len ak sa subor naozaj zmenil
          git diff --quiet && git diff --staged --quiet || (git commit -m "Automaticka aktualizacia trejdov" && git push)
