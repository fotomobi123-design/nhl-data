name: NHL Trade Scraper

on:
  schedule:
    - cron: '*/30 * * 1,4,5,6,8,9,10,11,12 *'
    - cron: '*/5 * * 2,3,7 *'
  workflow_dispatch:

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Explicitne povolenie zápisu pre tento konkrétny beh
    steps:
      - name: Stiahnutie kodu
        uses: actions/checkout@v4 # Používame najnovšiu verziu v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }} # Použijeme kľúč od GitHubu

      - name: Priprava Pythonu
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalacia kniznic
        run: pip install google-generativeai

      - name: Spustenie analyzy
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scraper.py

      - name: Ulozenie vysledku
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
         
          # Skontrolujeme, či súbor data.json vôbec vznikol
          if [ -f data.json ]; then
            git add data.json
            # Commitne a pushne len ak sú tam zmeny
            git diff --quiet && git diff --staged --quiet || (git commit -m "Aktualizacia dat" && git push)
          else
            echo "Súbor data.json nebol vytvorený. Skontroluj scraper.py!"
            exit 1
          fi
